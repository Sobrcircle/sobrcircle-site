<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="app-favicon" rel="icon" type="image/png" href="/assets/circle-favicon.png?v=4" />
    <link rel="shortcut icon" href="/assets/circle-favicon.png?v=4" />
    <link rel="apple-touch-icon" href="/assets/circle.png?v=4" />
    <meta name="apple-mobile-web-app-title" content="SobrCircle" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f4f6" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SobrCircle" />
    <meta property="og:title" content="SobrCircle" />
    <meta property="og:description" content="Built in recovery. For recovery." />
    <meta property="og:url" content="https://sobrcircle.com/" />
    <meta property="og:image" content="https://sobrcircle.com/assets/circle.png?v=4" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SobrCircle" />
    <meta name="twitter:description" content="Built in recovery. For recovery." />
    <meta name="twitter:image" content="https://sobrcircle.com/assets/circle.png?v=4" />
    <title>SobrCircle</title>
    <script>
      ;(() => {
        const updateFavicon = (isDark) => {
          const el = document.getElementById('app-favicon')
          if (!el) return
          el.setAttribute('href', isDark ? '/assets/circlewhite-favicon.png?v=4' : '/assets/circle-favicon.png?v=4')
        }

        const mq = window.matchMedia('(prefers-color-scheme: dark)')
        updateFavicon(mq.matches)
        mq.addEventListener('change', (event) => updateFavicon(event.matches))
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
